<div class="sidebar glass-sidebar">

    </div>
    
    <nav class="sidebar-nav">
        <ul>
            <li class="{% if request.endpoint == 'dashboard.index' %}active{% endif %}">
                <a href="{{ url_for('dashboard.index') }}">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.my_trips' %}active{% endif %}">

                    <i class="fas fa-map-marked-alt"></i>
                    <span>My Trips</span>
                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.create_trip' %}active{% endif %}">
                <a href="{{ url_for('dashboard.create_trip') }}">

                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.itinerary' %}active{% endif %}">
                <a href="{{ url_for('dashboard.itinerary') }}">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Itinerary</span>
                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.budget' %}active{% endif %}">
                <a href="{{ url_for('dashboard.budget') }}">

                    <span>Budget</span>
                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.activities' %}active{% endif %}">
                <a href="{{ url_for('dashboard.activities') }}">
                    <i class="fas fa-search-location"></i>
                    <span>Activity Search</span>
                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.packing_list' %}active{% endif %}">
                <a href="{{ url_for('dashboard.packing_list') }}">

            </li>

                <a href="{{ url_for('dashboard.profile') }}">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </li>
            <li class="{% if request.endpoint == 'dashboard.settings' %}active{% endif %}">
                <a href="{{ url_for('dashboard.settings') }}">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>
    
    <div class="sidebar-footer">
        <a href="{{ url_for('auth.logout') }}" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </a>
    </div>
</div>
