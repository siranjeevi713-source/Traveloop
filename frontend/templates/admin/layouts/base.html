<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveloop Admin - {% block title %}Analytics{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/glassmorphism.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="admin-theme">
    <div class="main-container">
        {% include 'admin/layouts/sidebar.html' %}
        
        <div class="content-wrapper">
            <header class="navbar">
                <div class="nav-left">
                    <div class="greeting">
                        <h1>Admin Dashboard</h1>
                        <p>Welcome back, {{ session.get('admin_username') }}</p>
                    </div>
                </div>
                <div class="nav-right">
                    <div class="nav-icon-btn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">5</span>
                    </div>
                    <div class="user-profile-dropdown">
                        <img src="{{ url_for('static', filename='images/avatars/admin.png') }}" alt="Admin" class="profile-img">
                        <div class="profile-info">
                            <span class="profile-name">Super Admin</span>
                            <span class="profile-role">System Root</span>
                        </div>
                    </div>
                </div>
            </header>
            
            <main id="main-content" class="fade-in">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
